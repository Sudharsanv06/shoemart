<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Shoemart</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <!-- New favicon with white shoe on black background -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><path d='M35,25 L65,25 L72,40 L65,65 C57,77 43,77 35,65 L28,40 Z' fill='white'/></svg>">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h2>CREATE ACCOUNT</h2>
        </div>
        <div class="auth-body">
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupUsername">USERNAME</label>
                    <input type="text" id="signupUsername" required>
                </div>
                <div class="form-group">
                    <label for="signupEmail">EMAIL</label>
                    <input type="email" id="signupEmail" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword">PASSWORD</label>
                    <input type="password" id="signupPassword" required>
                </div>
                <div class="form-group">
                    <label for="signupConfirm">CONFIRM PASSWORD</label>
                    <input type="password" id="signupConfirm" required>
                </div>
                <button type="submit" class="btn" style="width:100%">SIGN UP</button>
            </form>
            
            <div class="social-login">
                <p>OR SIGN UP WITH</p>
                <div class="social-buttons">
                    <a href="#" class="social-btn fb">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a href="#" class="social-btn google">
                        <i class="fab fa-google"></i>
                    </a>
                    <a href="#" class="social-btn instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
            </div>
            
            <div class="auth-footer">
                <p>ALREADY HAVE AN ACCOUNT? <a href="login.html">LOGIN</a></p>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('signupUsername').value;
            const email = document.getElementById('signupEmail').value;
            
            // Store user data including username and email
            const userData = {
                username: username,
                email: email
            };
            
            // Save user data to localStorage
            localStorage.setItem('userData', JSON.stringify(userData));
            
            // Set current user to username
            localStorage.setItem('currentUser', username);
            window.location.href = 'main.html';
        });
    </script>
</body>
</html>
