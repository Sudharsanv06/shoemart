<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shoemart</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <!-- New favicon with white shoe on black background -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><path d='M35,25 L65,25 L72,40 L65,65 C57,77 43,77 35,65 L28,40 Z' fill='white'/></svg>">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h2>LOGIN</h2>
        </div>
        <div class="auth-body">
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">USERNAME</label>
                    <input type="text" id="loginUsername" name="username" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">PASSWORD</label>
                    <input type="password" id="loginPassword" name="password" required>
                </div>
                <div class="remember-forgot">
                    <div>
                        <input type="checkbox" id="remember">
                        <label for="remember">REMEMBER ME</label>
                    </div>
                    <a href="#">FORGOT PASSWORD?</a>
                </div>
                <button type="submit" class="btn" style="width:100%">LOGIN</button>
            </form>
            <div class="social-login">
                <p>OR LOGIN WITH</p>
                <div class="social-buttons">
                    <a href="#" class="social-btn fb">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a href="#" class="social-btn google">
                        <i class="fab fa-google"></i>
                    </a>
                    <a href="#" class="social-btn instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
            </div>
            
            <div class="auth-footer">
                <p>DON'T HAVE AN ACCOUNT? <a href="signup.html">SIGN UP</a></p>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            
            // Set current user to username
            localStorage.setItem('currentUser', username);
            
            // Redirect to main page
            window.location.href = 'main.html';
        });
    </script>
</body>
</html>
